name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: API sanity check (can token read hacs.json?)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          echo "repo=$GITHUB_REPOSITORY ref=$GITHUB_REF_NAME"
          curl -sS -D /tmp/headers.txt \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/hacs.json?ref=${GITHUB_REF_NAME}" \
            -o /tmp/body.json || true

          echo "== status/headers =="
          sed -n '1,20p' /tmp/headers.txt || true
          echo "== body (first 300 chars) =="
          head -c 300 /tmp/body.json; echo
      - name: Show decoded hacs.json from GitHub API (debug)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          curl -sS \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/hacs.json?ref=${GITHUB_REF_NAME}" \
            | python - <<'PY'
          import json, base64, sys
          data=json.load(sys.stdin)
          raw=base64.b64decode(data["content"])
          print("first_bytes_hex:", raw[:8].hex())
          print(raw.decode("utf-8"))
          PY

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master
