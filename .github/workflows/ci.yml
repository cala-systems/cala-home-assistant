name: Validate

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug repo for HACS
        run: |
          set -euxo pipefail
          echo "REF=$GITHUB_REF"
          echo "SHA=$GITHUB_SHA"
          echo "Root listing:"
          ls -la
          echo "hacs.json:"
          ls -la hacs.json
          cat hacs.json
          echo "custom_components tree:"
          find custom_components -maxdepth 3 -print
          echo "manifest.json:"
          ls -la custom_components/cala/manifest.json
          python -m json.tool custom_components/cala/manifest.json > /dev/null
      - name: Run HACS validation
        uses: hacs/action@22.5.0
        with:
          category: integration
          github_token: ${{ secrets.GITHUB_TOKEN }}

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master
